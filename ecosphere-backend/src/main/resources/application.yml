server:
  port: 8080

spring:
  config:
    import: optional:classpath:application-secrets.yml
  application:
    name: ecosphere-backend
  datasource:
    url: jdbc:mysql://localhost:3306/ecosphere?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: root123
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

app:
  jwt:
    secret: 926D96C90030DD58429D2751AC1BDBBC926D96C90030DD58429D2751AC1BDBBC
    expiration-milliseconds: 604800000 # 7 days

ai:
  gemini:
    api:
      key: ${GEMINI_API_KEY:YOUR_GEMINI_API_KEY_HERE}
      url: https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-latest:generateContent
  news:
    api:
      key: ${NEWS_API_KEY:YOUR_NEWS_API_KEY_HERE}
      url: https://newsapi.org/v2/everything?q=ESG OR sustainability OR "climate change"&sortBy=publishedAt&language=en
  weather:
    api:
      key: ${WEATHER_API_KEY:YOUR_WEATHER_API_KEY_HERE}
      url: https://api.openweathermap.org/data/2.5/weather
    default:
      location: Coimbatore,IN
